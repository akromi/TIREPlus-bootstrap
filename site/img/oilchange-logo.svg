<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Oil bottle -->
  <rect x="30" y="35" width="30" height="45" rx="4" stroke="#1b2a4a" stroke-width="4" fill="none"/>
  <rect x="36" y="25" width="18" height="14" rx="2" stroke="#1b2a4a" stroke-width="3" fill="none"/>
  <rect x="40" y="18" width="10" height="10" rx="2" stroke="#1b2a4a" stroke-width="3" fill="none"/>
  <!-- Oil level inside bottle -->
  <rect x="34" y="55" width="22" height="21" rx="2" fill="#d9232e" opacity="0.85"/>
  <!-- Oil drop pouring -->
  <path d="M68 30 C68 30, 72 40, 72 45 C72 49, 68 49, 68 45 C68 40, 68 30, 68 30Z" fill="#d9232e"/>
  <path d="M76 42 C76 42, 79 49, 79 52 C79 55, 76 55, 76 52 C76 49, 76 42, 76 42Z" fill="#d9232e" opacity="0.6"/>
  <!-- Label on bottle -->
  <text x="45" y="50" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#1b2a4a">OIL</text>
</svg>
